name: codemap

# Regenerate CODEMAP.md on every push to main — no matter who pushes — so the
# repo always carries a current map for humans and agents. See scripts/gen_codemap.py.

on:
  push:
    branches: [main]
    # The bot only commits the two generated map files, so a push that changes
    # *just* those won't re-trigger this workflow (no loop). Belt-and-braces:
    # commits made with GITHUB_TOKEN don't trigger workflows anyway.
    paths-ignore:
      - "CODEMAP.md"
      - "frontend/public/codemap.html"
  workflow_dispatch: {}

# Never run two map-updates on main at once — they'd race on the push.
concurrency:
  group: codemap-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  codemap:
    runs-on: ubuntu-latest
    # Only the canonical repo regenerates the map. The jawadjalal/TenderBreak
    # Vercel mirror also carries this workflow file, but must NOT run it — two
    # bots committing on the same parent makes the remotes diverge at the tip.
    if: github.repository == 'Welddevelopment/Tender_Breakdown_AI-Agent'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate CODEMAP.md
        run: python scripts/gen_codemap.py

      - name: Commit if the map changed
        run: |
          MAP_FILES="CODEMAP.md frontend/public/codemap.html"
          if git diff --quiet -- $MAP_FILES; then
            echo "Map unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "codemap-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $MAP_FILES
          git commit -m "chore(codemap): refresh map [skip ci]"
          # A teammate may have pushed while we ran — rebase and retry the push.
          for i in 1 2 3; do
            if git push; then
              echo "pushed."; exit 0
            fi
            echo "push rejected (attempt $i) — rebasing on latest main…"
            git pull --rebase --autostash origin main || true
          done
          echo "::error::could not push CODEMAP.md after 3 attempts"
          exit 1
